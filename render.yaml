# Blueprint do Render — cria o serviço automaticamente a partir deste repositório.
# Painel: New + → Blueprint → escolhe este repo.
#
# Base de dados: PostgreSQL no Supabase (grátis e permanente).
# Usamos variáveis SEPARADAS (à prova de caracteres especiais na palavra-passe).
services:
  - type: web
    name: consignacoes-3d
    runtime: docker
    region: frankfurt          # mais perto de Portugal
    plan: free                 # grátis: a app "adormece" após 15 min sem uso (acorda em ~1 min)
    envVars:
      - key: APP_NAME
        value: Consignações 3D
      # ── Supabase (Session pooler, IPv4) ──
      - key: DB_DRIVER
        value: pgsql
      - key: DB_PORT
        value: "5432"          # Session pooler (NÃO 6543)
      - key: DB_NAME
        value: postgres
      - key: DB_HOST
        sync: false            # ← ex.: aws-1-eu-central-1.pooler.supabase.com
      - key: DB_USER
        sync: false            # ← ex.: postgres.bgfbqaqigbvshhuhashw
      - key: DB_PASS
        sync: false            # ← a tua password do Supabase (crua, tal como é)
      # ── Email (Gmail) ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: fivelayers3d@gmail.com
      - key: SMTP_PASS
        sync: false            # ← palavra-passe de app do Gmail
