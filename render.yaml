# Blueprint do Render — cria o serviço automaticamente a partir deste repositório.
# Painel: New + → Blueprint → escolhe este repo.
services:
  - type: web
    name: consignacoes-3d
    runtime: docker
    region: frankfurt          # mais perto de Portugal
    plan: free                 # ⚠️ FREE: dados em SQLite NÃO persistem (apagados a cada deploy/reinício)
                               #    Para dados permanentes: muda para "starter" e descomenta o bloco "disk" abaixo.
    envVars:
      - key: APP_NAME
        value: Consignações 3D
      - key: DB_DRIVER
        value: sqlite          # com disco persistente, o SQLite passa a guardar tudo
      - key: DB_SQLITE_PATH
        value: /var/www/html/data/consignacoes.sqlite
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: fivelayers3d@gmail.com
      - key: SMTP_PASS
        sync: false            # ← define no painel (Environment) — NÃO fica no Git
    # ─── DADOS PERMANENTES (requer plano "starter" ~7$/mês) ───
    # disk:
    #   name: dados
    #   mountPath: /var/www/html/data
    #   sizeGB: 1
